name = "contractor-quote-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# D1 Database
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cq-dev"
database_id = "6c180e3d-fbaf-4ec0-9cce-f6770b2a8afe"

# ---------------------------------------------------------------------------
# R2 Bucket — photo storage
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cq-dev-photos"

# ---------------------------------------------------------------------------
# KV Namespace — signed token store (appointment links, upload tokens)
# NOTE: KV not yet provisioned — using placeholder. Create with:
#   npx wrangler kv namespace create TOKENS
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "TOKENS"
id = "placeholder-replace-with-real-kv-id"

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put <NAME>`)
# ---------------------------------------------------------------------------
# HUBSPOT_ACCESS_TOKEN   — HubSpot private-app token for CRM submission
# TOKEN_SIGNING_SECRET   — HMAC secret for signed URL tokens
# SENDGRID_API_KEY       — SendGrid API key for email notifications
# TURNSTILE_SECRET_KEY   — Cloudflare Turnstile secret key for bot protection
#
# Example:
#   wrangler secret put HUBSPOT_ACCESS_TOKEN
#   wrangler secret put TOKEN_SIGNING_SECRET
#   wrangler secret put SENDGRID_API_KEY
#   wrangler secret put TURNSTILE_SECRET_KEY

# ---------------------------------------------------------------------------
# Local dev vars (not for production)
# ---------------------------------------------------------------------------
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:5173"
