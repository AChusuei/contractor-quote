name = "contractor-quote-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# D1 Database
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cq-dev"
database_id = "6c180e3d-fbaf-4ec0-9cce-f6770b2a8afe"
migrations_dir = "migrations"
migrations_table = "d1_migrations"

# ---------------------------------------------------------------------------
# R2 Bucket — photo storage
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cq-dev"

# ---------------------------------------------------------------------------
# KV Namespace — rate limiting counters
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "KV"
id = "f550d2c295914276a23af2d4b29dbaeb"

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put <NAME>`)
# ---------------------------------------------------------------------------
# TOKEN_SIGNING_SECRET   — HMAC secret for signed URL tokens
# SENDGRID_API_KEY       — SendGrid API key for email notifications
# TURNSTILE_SECRET_KEY   — Cloudflare Turnstile secret key for bot protection
# CLERK_JWKS_URL         — Clerk JWKS endpoint for JWT signature verification
#                          e.g. https://<your-clerk-domain>/.well-known/jwks.json
#                          Find your domain in Clerk dashboard → API Keys → Advanced
#
# Example:
#   wrangler secret put TOKEN_SIGNING_SECRET
#   wrangler secret put SENDGRID_API_KEY
#   wrangler secret put TURNSTILE_SECRET_KEY
#   wrangler secret put CLERK_JWKS_URL
#   wrangler secret put PLATFORM_ADMIN_EMAILS

# ---------------------------------------------------------------------------
# Local dev vars (not for production — see .dev.vars for secret overrides)
# ---------------------------------------------------------------------------
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:5173"
NOTIFICATION_FROM_EMAIL = "noreply@localhost"
APP_BASE_URL = "http://localhost:5173"

# ---------------------------------------------------------------------------
# Dev environment — deployed as contractor-quote-api-dev
# ---------------------------------------------------------------------------
[env.dev]
name = "contractor-quote-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "cq-dev"
database_id = "6c180e3d-fbaf-4ec0-9cce-f6770b2a8afe"
migrations_dir = "migrations"
migrations_table = "d1_migrations"

[[env.dev.r2_buckets]]
binding = "STORAGE"
bucket_name = "cq-dev"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "f550d2c295914276a23af2d4b29dbaeb"

[env.dev.vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "https://contractor-quote-dev.pages.dev,https://*.dev.contractorquote.work"
NOTIFICATION_FROM_EMAIL = "noreply@contractorquote.work"
APP_BASE_URL = "https://contractor-quote-dev.pages.dev"
